<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linagora - Menu Frontend</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-container">
        <nav class="navbar">
            <div class="nav-left">
                <div class="logo">LINAGORA</div>
                <span class="nav-item">IA</span>
                <button class="nav-item btn-logiciels" id="menu-trigger">
                    Logiciels <span class="arrow">▼</span>
                </button>
                <span class="nav-item">OSSA</span>
                <span class="nav-item">Services</span>
                <span class="nav-item">Communauté</span>
                <span class="nav-item">Carrières</span>
                <span class="nav-item">A propos</span>
                <span class="nav-item">Contactez-nous</span>
            </div>
            <div class="nav-right">
                <span class="icon">🔍</span>
                <span class="icon">💻</span>
                <span class="icon">🇫🇷 ▼</span>
            </div>
        </nav>

        <div class="mega-menu" id="mega-menu">
            <div class="list-container">
                
                <div class="infoblock">
                    <h2 id="headline">Some long text in to<br>the 2 lines</h2>
                    <a href="#" class="sidebar-link">Here is the link →</a>
                </div>

                <div class="columns-wrapper" id="api-content">
                    
                    <div class="menu-column">
                        <div class="skeleton-item"><div class="skeleton-img pulse"></div><div class="skeleton-content"><div class="skeleton-title pulse"></div><div class="skeleton-text pulse"></div><div class="skeleton-link pulse"></div></div></div>
                        <div class="skeleton-item"><div class="skeleton-img pulse"></div><div class="skeleton-content"><div class="skeleton-title pulse"></div><div class="skeleton-text pulse"></div><div class="skeleton-link pulse"></div></div></div>
                        <div class="skeleton-item"><div class="skeleton-img pulse"></div><div class="skeleton-content"><div class="skeleton-title pulse"></div><div class="skeleton-text pulse"></div><div class="skeleton-link pulse"></div></div></div>
                    </div>
                    <div class="menu-column">
                        <div class="skeleton-item"><div class="skeleton-img pulse"></div><div class="skeleton-content"><div class="skeleton-title pulse"></div><div class="skeleton-text pulse"></div><div class="skeleton-link pulse"></div></div></div>
                        <div class="skeleton-item"><div class="skeleton-img pulse"></div><div class="skeleton-content"><div class="skeleton-title pulse"></div><div class="skeleton-text pulse"></div><div class="skeleton-link pulse"></div></div></div>
                        <div class="skeleton-item"><div class="skeleton-img pulse"></div><div class="skeleton-content"><div class="skeleton-title pulse"></div><div class="skeleton-text pulse"></div><div class="skeleton-link pulse"></div></div></div>
                    </div>
                    
                </div>
            </div>
        </div>

        <div class="overlay" id="page-overlay"></div>
    </main>
    <script src="app.js"></script>
</body>
</html>
